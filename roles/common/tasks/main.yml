---
# On a fresh Ubuntu install, unattended-upgrades runs on first boot and holds
# the dpkg lock for several minutes. Stop it and wait for any lingering lock.
# The hardening role re-enables unattended-upgrades at the end of provisioning.
- name: Stop unattended-upgrades to release apt lock
  systemd:
    name: unattended-upgrades
    state: stopped
  failed_when: false

- name: Wait for apt locks to be released
  shell: |
    while fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock /var/cache/apt/archives/lock >/dev/null 2>&1; do
      echo "Waiting for apt lock..."
      sleep 5
    done
  args:
    executable: /bin/bash
  changed_when: false
  timeout: 300

- name: Remove conflicting Docker repo files
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/docker.sources
    - /etc/apt/keyrings/docker.asc

- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  apt:
    name:
      - curl
      - tar
      - unzip
      - ca-certificates
      - gnupg
      - lsb-release
      - apt-transport-https
    state: present

- name: Add Docker GPG key
  shell: |
    install -m 0755 -d /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg \
      | gpg --dearmor --yes -o /etc/apt/keyrings/docker.gpg
    chmod a+r /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: Add Docker apt repository
  copy:
    dest: /etc/apt/sources.list.d/docker.list
    content: |
      deb [arch={{ docker_arch }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} stable
    mode: "0644"
  vars:
    docker_arch: "{{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' if ansible_architecture == 'aarch64' else ansible_architecture }}"
  register: docker_repo

- name: Update apt cache after adding Docker repo
  apt:
    update_cache: true
  when: docker_repo.changed

- name: Install Docker CE
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present

- name: Ensure Docker is running
  systemd:
    name: docker
    state: started
    enabled: true
